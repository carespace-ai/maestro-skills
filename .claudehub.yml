skills:
  - name: context-layer
    description: "Auto-regenerate a repo's Context Layer (hierarchical AGENTS.md/CLAUDE.md) on a default-branch push and open/update one idempotent docs-only PR. Triggered by a GitHub push webhook."
    prompt: "/context-layer"
    max_turns: 60

  - name: carespace-code-review
    description: "Autonomous PR security review — HIPAA/OWASP audit + code quality, posts findings as PR comment"
    prompt: "/carespace-code-review"
    max_turns: 30

  - name: carespace-security-auditor
    description: "Security vulnerability detection — HIPAA, OWASP Top 10, Azure, NestJS/Prisma/React/Flutter"
    prompt: "/carespace-security-auditor"
    max_turns: 30

  - name: carespace-security-standards
    description: "Reference skill — CareSpace security standards, HIPAA rules, OWASP healthcare context"
    prompt: "/carespace-security-standards"
    max_turns: 10

  - name: pipeline
    description: "Autonomous dev pipeline — full gstack sprint from issue to PR (investigate, build, review, security, QA, ship)"
    prompt: "/pipeline"
    max_turns: 200

  - name: the-oracle-story-dev
    description: "Autonomous BMAD story development — reads stories-output.md from the-oracle-backlog, manages sprint manifest, develops one story across all repos_affected, opens cross-repo PRs via multi-gitter"
    prompt: "/the-oracle-story-dev"
    max_turns: 200
